name: Update Nix flake

on:
  schedule:
    # Runs every day at 09:00 JST.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      update_mode:
        description: "Use pull-request normally; use push to commit directly to the checked-out branch."
        required: true
        default: pull-request
        type: choice
        options:
          - pull-request
          - push

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nix-flake-update
  cancel-in-progress: false

jobs:
  update:
    name: Update flake.lock
    runs-on: ubuntu-latest

    env:
      # Set the NIX_FLAKE_UPDATE_MODE repository variable to "push" to make
      # scheduled runs push directly instead of opening a pull request.
      UPDATE_MODE: ${{ inputs.update_mode || vars.NIX_FLAKE_UPDATE_MODE || 'pull-request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update flake lock
        run: nix flake update

      - name: Check flake
        run: nix flake check

      - name: Create or update pull request
        if: env.UPDATE_MODE == 'pull-request'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: flake.lock
          branch: automation/nix-flake-update
          commit-message: "chore: update nix flake lock"
          delete-branch: true
          title: "chore: update nix flake lock"
          body: |
            Automated daily `nix flake update`.

            This PR was created by GitHub Actions.

      - name: Commit and push directly
        if: env.UPDATE_MODE == 'push'
        run: |
          if git diff --quiet -- flake.lock; then
            echo "flake.lock is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update nix flake lock"
          git push origin "HEAD:${GITHUB_REF_NAME}"
